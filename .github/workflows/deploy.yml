name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true        # 首次執行自動開啟 GitHub Pages（免手動切換）
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .                 # 整個 repo 根目錄即為靜態網站
      - id: deployment
        uses: actions/deploy-pages@v4
